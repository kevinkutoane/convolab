name: ConvoLab CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject generated build output
        run: |
          if git ls-files | grep -E '(^|/)(bin|obj|dist|node_modules)/'; then
            echo "Generated build output is tracked."
            exit 1
          fi
      - name: Reject common committed secrets
        run: |
          if git grep -nEI '(GEMINI_API_KEY|OPENAI_API_KEY|ANTHROPIC_API_KEY)[[:space:]]*=[[:space:]]*[^$<{[:space:]]+' -- ':!*.example' ':!docs/**'; then
            echo "Possible committed secret detected."
            exit 1
          fi
      - name: Reject duplicate migration identifiers
        run: |
          ids=$(grep -Rho '\[Migration("[^"]*")\]' src/Infrastructure/ConvoLab.Infrastructure/Data/Migrations | sort)
          duplicates=$(echo "$ids" | uniq -d)
          test -z "$duplicates" || { echo "$duplicates"; exit 1; }

  platform:
    name: Platform Core
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: convolab_test_host
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CONVOLAB_POSTGRES_TEST_CONNECTION: Host=127.0.0.1;Port=5432;Database=convolab_test_host;Username=postgres;Password=postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            src/**/*.csproj
      - name: Restore API graph
        run: dotnet restore src/Api/ConvoLab.Api/ConvoLab.Api.csproj
      - name: Restore tests
        run: |
          for project in src/tests/*/*.csproj; do dotnet restore "$project"; done
      - name: Build Platform API
        run: dotnet build src/Api/ConvoLab.Api/ConvoLab.Api.csproj --configuration Release --no-restore
      - name: Build tests
        run: |
          for project in src/tests/*/*.csproj; do dotnet build "$project" --configuration Release --no-restore; done
      - name: Run all tests
        run: |
          mkdir -p TestResults
          for project in src/tests/*/*.csproj; do
            name=$(basename "$(dirname "$project")")
            dotnet test "$project" --configuration Release --no-build \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory TestResults
          done
      - name: Verify Application has no EF dependency
        run: '! grep -R "Microsoft.EntityFrameworkCore" src/Application/ConvoLab.Application'
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults

  studio:
    name: ConvoLab Studio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
      - run: npm run test -- --run
      - run: npm run test:baseline
      - run: npm audit --audit-level=high
      - name: Upload bundle manifest
        uses: actions/upload-artifact@v4
        with:
          name: studio-bundle-manifest
          path: |
            web/dist/.vite/manifest.json
            web/dist/bundle-report.json
            web/dist/bundle-report.md
            web/dist/assets

  containers:
    name: Docker acceptance
    runs-on: ubuntu-latest
    needs: [platform, studio]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: docker compose up --build -d
      - name: Wait for readiness
        run: timeout 120 sh -c 'until curl --fail --silent http://127.0.0.1:5000/health/ready; do sleep 2; done'
      - run: npm run test:cross-capability
        working-directory: web
        env:
          CONVOLAB_EVIDENCE_PATH: /tmp/convolab-evidence.json
      - run: npm run test:browser
        working-directory: web
      - name: Restart persistence verification
        run: |
          docker compose restart db api
          timeout 120 sh -c 'until curl --fail --silent http://127.0.0.1:5000/health/ready; do sleep 2; done'
          CONVOLAB_EVIDENCE_PATH=/tmp/convolab-evidence.json npm --prefix web run test:restart
          npm --prefix web run test:browser
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down
