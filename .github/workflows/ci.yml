name: ConvoLab CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject generated build output
        run: |
          if git ls-files | grep -E '(^|/)(bin|obj|dist|node_modules)/'; then
            echo "Generated build output is tracked."
            exit 1
          fi
      - name: Reject common committed secrets
        run: |
          if git grep -nEI '(GEMINI_API_KEY|OPENAI_API_KEY|ANTHROPIC_API_KEY)[[:space:]]*=[[:space:]]*[^$<{[:space:]]+' -- ':!*.example' ':!docs/**'; then
            echo "Possible committed secret detected."
            exit 1
          fi
      - name: Reject duplicate migration identifiers
        run: |
          ids=$(grep -Rho '\[Migration("[^"]*")\]' src/Infrastructure/ConvoLab.Infrastructure/Data/Migrations | sort)
          duplicates=$(echo "$ids" | uniq -d)
          test -z "$duplicates" || { echo "$duplicates"; exit 1; }

  platform:
    name: Platform Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            src/**/*.csproj
      - name: Restore API graph
        run: dotnet restore src/Api/ConvoLab.Api/ConvoLab.Api.csproj
      - name: Restore tests
        run: |
          for project in src/tests/*/*.csproj; do dotnet restore "$project"; done
      - name: Build Platform API
        run: dotnet build src/Api/ConvoLab.Api/ConvoLab.Api.csproj --configuration Release --no-restore
      - name: Build tests
        run: |
          for project in src/tests/*/*.csproj; do dotnet build "$project" --configuration Release --no-restore; done
      - name: Run all tests
        run: |
          mkdir -p TestResults
          for project in src/tests/*/*.csproj; do
            name=$(basename "$(dirname "$project")")
            dotnet test "$project" --configuration Release --no-build \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory TestResults
          done
      - name: Verify Application has no EF dependency
        run: '! grep -R "Microsoft.EntityFrameworkCore" src/Application/ConvoLab.Application'
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults

  studio:
    name: ConvoLab Studio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
      - run: npm run test -- --run
      - run: npm audit --audit-level=high

  containers:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [platform, studio]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
