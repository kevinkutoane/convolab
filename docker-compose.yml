services:
  api:
    build:
      context: .
      dockerfile: src/Api/ConvoLab.Api/Dockerfile
    container_name: convolab-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=convolab;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: convolab-web
    ports:
      - "3000:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    container_name: convolab-db
    environment:
      - POSTGRES_DB=convolab
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
